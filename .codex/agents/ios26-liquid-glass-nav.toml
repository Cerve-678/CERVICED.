} from 'react-native-reanimated';
```

Implement these layers (bottom to top):
1. **Base blur layer** — `BlurView` with `intensity={85}` and matching `tint`
2. **Refraction shimmer** — `LinearGradient` overlay at 15–20% opacity, angled 135°, cycling `rgba(255,255,255,0)` → `rgba(255,255,255,0.25)` → `rgba(255,255,255,0)`, animated on mount with a 3-second loop using `withRepeat`
3. **Specular edge highlight** — 1px top border using `rgba(255,255,255,0.4)` on light mode, `rgba(255,255,255,0.15)` on dark
4. **Background tint** — `rgba(242,242,247,0.72)` light / `rgba(28,28,30,0.72)` dark (matches iOS 26 chrome material)
5. **Tab icons and labels** — rendered above all glass layers

### Step 4 — Physics-Based Animations

Implement authentic Liquid Glass motion:

**Tab press animation** (per tab item):
```ts
const scale = useSharedValue(1);
const onPressIn = () => { scale.value = withSpring(0.88, { damping: 15, stiffness: 400 }); };
const onPressOut = () => { scale.value = withSpring(1, { damping: 12, stiffness: 300 }); };
```

**Active indicator** — pill-shaped background that slides between tabs using `withSpring({ damping: 20, stiffness: 350 })` on an absolute-positioned `Animated.View`

**Shimmer ambient loop** — subtle shimmer gradient that drifts across the glass surface continuously using `withRepeat(withTiming(..., { duration: 3000 }), -1, true)`

**Haptic feedback** — call `Haptics.impactAsync(Haptics.ImpactFeedbackStyle.Light)` from `expo-haptics` on each tab press (install if missing)

### Step 5 — Navigation Integration

**expo-router**: Override `tabBar` prop in `<Tabs>` layout:
```tsx
<Tabs tabBar={(props) => <LiquidGlassTabBar {...props} />}>
```

**@react-navigation/bottom-tabs**: Pass as `tabBar` to `<Tab.Navigator>`

**Custom nav**: Replace existing bottom bar component directly

Ensure `position: 'absolute'` on the bar so content renders underneath the glass, and add `paddingBottom` to screens equal to tab bar height + safe area inset.

### Step 6 — Safe Area & Platform Handling
- Use `useSafeAreaInsets()` from `react-native-safe-area-context` for bottom padding
- On Android, reduce blur intensity to 60 (Android blur performance is lower) and add a semi-opaque fallback background
- Respect `Platform.OS` for shadow styles: iOS uses `shadowColor/shadowOpacity`, Android uses `elevation`

### Step 7 — Dark Mode Support
- Use `useColorScheme()` hook
- Swap tint values, icon colors, and label colors dynamically
- The glass itself should adapt: lighter glass on light backgrounds, darker glass on dark backgrounds

## Quality Checklist (self-verify before finishing)
- [ ] Blur is visible and feels like frosted glass, not just transparent
- [ ] Shimmer/refraction effect is present and subtle (not distracting)
- [ ] Tab transitions use spring physics, not linear timing
- [ ] Press states have scale + haptic feedback
