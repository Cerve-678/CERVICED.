## Step-by-Step Execution Protocol

### Step 1 — Dependency Discovery
- Check `package.json` for existing blur/glass libraries: `expo-blur`, `@react-native-community/blur`, `expo-glass-effect`, `react-native-reanimated`, `react-native-gesture-handler`
- Attempt to install `expo-glass-effect` first:
  ```
  npx expo install expo-glass-effect
  ```
- If `expo-glass-effect` is unavailable or incompatible, fall back to the proven stack:
  ```
  npx expo install expo-blur react-native-reanimated react-native-gesture-handler
  ```
- After installation, verify peer dependencies and run `npx expo doctor` if available.

### Step 2 — Architecture Assessment
- Identify the navigation library in use: `expo-router`, `@react-navigation/bottom-tabs`, or custom
- Locate the current bottom nav component or tab bar configuration
- Note the color scheme (light/dark mode support required)
- Check if the project uses TypeScript — generate typed components if so

### Step 3 — Liquid Glass Component Implementation

**If `expo-glass-effect` is available**, use its `GlassView` primitive as the container and layer the tab bar content inside it, configuring:
- `intensity`: 80–95 for authentic iOS 26 blur depth
- `tint`: `'systemChrome'` or `'light'`/`'dark'` based on color scheme
- Specular highlight overlay with `rgba(255,255,255,0.18)` gradient edge

**If falling back to `expo-blur` + Reanimated**, build the component with:
```tsx
import { BlurView } from 'expo-blur';
import Animated, {
  useSharedValue, useAnimatedStyle,
