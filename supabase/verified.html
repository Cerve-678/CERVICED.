<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified – CERVICED</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5E6FA;
      font-family: Georgia, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(163,66,195,0.14);
    }
    .brand {
      background: linear-gradient(135deg, #a342c3, #DA70D6);
      border-radius: 16px;
      padding: 20px 32px;
      display: inline-block;
      margin-bottom: 36px;
    }
    .brand-name {
      color: #fff;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 4px;
      font-family: Impact, 'Arial Black', sans-serif;
    }
    .brand-tag {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .check {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 {
      color: #1a1a1a;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .label {
      color: #DA70D6;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    p {
      color: #555;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .box {
      background: #F5E6FA;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 12px;
    }
    .box-label {
      color: #a342c3;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .box p {
      color: #444;
      font-size: 14px;
      margin-bottom: 0;
      line-height: 1.5;
    }
    .footer {
      margin-top: 36px;
      color: #a342c3;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">CERVICED</div>
      <div class="brand-tag">Beauty at your fingertips</div>
    </div>

    <div class="check">✓</div>
    <h1>Email Verified</h1>
    <p class="label">You're all set</p>

    <p>Your email is confirmed. Open the <strong>CERVICED app</strong> on your phone and tap <strong>"I've verified my email"</strong> to enter your account.</p>

    <div class="footer">© CERVICED · cerviced.co</div>
  </div>
</body>
</html>
